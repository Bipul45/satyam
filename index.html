<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: radial-gradient(circle, #3a003a, #000);
  color: white;
  overflow: hidden;
  text-align: center;
}

/* screens */
.screen {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  animation: fade 1s;
}

.active {
  display: flex;
}

@keyframes fade {
  from {opacity:0; transform:scale(0.9);}
  to {opacity:1; transform:scale(1);}
}

/* button */
button {
  padding: 12px 25px;
  border-radius: 25px;
  border: none;
  background: linear-gradient(45deg, #ff4d88, #ff0066);
  color: white;
  font-size: 16px;
  margin-top: 20px;
  cursor: pointer;
}

/* gif */
.gif {
  width: 120px;
  border-radius: 50%;
  box-shadow: 0 0 30px pink;
}

/* hearts */
.heart {
  position: absolute;
  color: pink;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% {transform: translateY(100vh); opacity:1;}
  100% {transform: translateY(-10vh); opacity:0;}
}

/* reveal boxes */
.box {
  width: 80%;
  padding: 15px;
  margin: 10px;
  border-radius: 12px;
  background: rgba(255,255,255,0.1);
  cursor: pointer;
  transition: 0.3s;
}

/* hidden initially */
.hidden-text {
  opacity: 0;
}

/* typing */
#typed {
  width: 80%;
  margin-top: 20px;
}

</style>
</head>

<body>

<!-- music -->
<audio autoplay loop>
  <source src="music.mp3" type="audio/mp3">
</audio>

<!-- SCREEN 1 -->
<div class="screen active" id="s1">
  <img src="cute.gif" class="gif">
  <h1>Hey Cutiepie 💖</h1>
  <button onclick="next(2)">Let's check 😳</button>
</div>

<!-- SCREEN 2 -->
<div class="screen" id="s2">
  <h2>Measuring your cuteness... ⏳</h2>
  <h1 id="percent">0%</h1>
  <button onclick="next(3)" id="nextBtn" style="display:none;">Continue →</button>
</div>

<!-- SCREEN 3 -->
<div class="screen" id="s3">
  <h2>Tap each one ❤️</h2>

  <div class="box" onclick="reveal(this)">
    <span class="hidden-text">I'm sorry if I annoyed you 😔</span>
  </div>

  <div class="box" onclick="reveal(this)">
    <span class="hidden-text">I really miss you 🥺</span>
  </div>

  <div class="box" onclick="reveal(this)">
    <span class="hidden-text">You are my everything 💖</span>
  </div>

  <button onclick="next(4)">See more →</button>
</div>

<!-- SCREEN 4 -->
<div class="screen" id="s4">
  <h2>A little note for you 💌</h2>
  <button onclick="startTyping()">Tap to open</button>
  <p id="typed"></p>
</div>

<script>

// screen switch
function next(n){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("s"+n).classList.add("active");

  if(n==2) loading();
}

// loading %
function loading(){
  let i=0;
  let int=setInterval(()=>{
    i++;
    document.getElementById("percent").innerText=i+"%";
    if(i>=100){
      clearInterval(int);
      document.getElementById("nextBtn").style.display="block";
    }
  },30);
}

// reveal text smoothly
function reveal(el){
  let span = el.querySelector("span");
  span.style.opacity = 1;
}

// typing effect
function startTyping(){
  let text="I'm really sorry my love... please forgive me ❤️";
  let i=0;

  let int=setInterval(()=>{
    document.getElementById("typed").innerHTML += text[i];
    i++;
    if(i>=text.length) clearInterval(int);
  },50);
}

// floating hearts
setInterval(()=>{
  let heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="❤️";
  heart.style.left=Math.random()*100+"vw";
  heart.style.fontSize=(Math.random()*20+10)+"px";
  document.body.appendChild(heart);

  setTimeout(()=>heart.remove(),5000);
},300);

</script>

</body>
</html>
