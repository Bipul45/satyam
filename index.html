<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Her ❤️</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial;
  color: white;
}

#startHeart {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 60px;
  cursor: pointer;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px pink; }
  to { text-shadow: 0 0 25px red; }
}

canvas {
  display: none;
}

#text {
  position: absolute;
  left: 50px;
  top: 40%;
  width: 300px;
  font-size: 18px;
  line-height: 1.5;
}

#gif {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: none;
}
</style>
</head>

<body>

<div id="startHeart">💗</div>

<canvas id="canvas"></canvas>

<div id="text"></div>

<img id="gif" src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif" width="200">

<!-- 🎵 MUSIC -->
<audio id="music" src="https://www2.cs.uic.edu/~i101/SoundFiles/StarWars60.wav"></audio>

<script>
const heart = document.getElementById("startHeart");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const textDiv = document.getElementById("text");
const gif = document.getElementById("gif");
const music = document.getElementById("music");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

heart.onclick = () => {
  heart.style.display = "none";
  canvas.style.display = "block";

  music.play(); // 🎵 music start

  startAnimation();
  typeText();
};

function createHeart(x, y) {
  return {
    x: x,
    y: y,
    size: Math.random() * 6 + 2,
    speedY: Math.random() * 2 + 1
  };
}

function drawHeart(x, y, size) {
  ctx.fillStyle = "pink";
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.bezierCurveTo(x - size, y - size, x - size*2, y + size, x, y + size*2);
  ctx.bezierCurveTo(x + size*2, y + size, x + size, y - size, x, y);
  ctx.fill();
}

function getTreeShape(t) {
  let x = canvas.width/2 + 200 * Math.sin(t);
  let y = canvas.height/2 - 200 * Math.cos(t);
  return {x, y};
}

function startAnimation() {
  function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let i=0;i<5;i++){
      let pos = getTreeShape(Math.random()*Math.PI*2);
      particles.push(createHeart(pos.x, pos.y));
    }

    particles.forEach((p)=>{
      p.y += p.speedY;
      drawHeart(p.x, p.y, p.size);
    });

    requestAnimationFrame(animate);
  }
  animate();
}

const message = `Hey you 💖
Happy Birthday 🎉
May God bless you 🌸
And give you many happiness 💕
Just saying... I love you ❤️`;

function typeText() {
  let i = 0;
  function typing() {
    if(i < message.length){
      textDiv.innerHTML += message.charAt(i);
      i++;
      setTimeout(typing, 40);
    } else {
      gif.style.display = "block";
    }
  }
  typing();
}
</script>

</body>
</html>
